name: Build all

# Fork build: Linux amd64 only (no Windows/macOS/aarch64/Flatpak) and no nightly
# `schedule` trigger. Scheduled workflows are disabled by default on forks, which
# put the whole workflow into a `disabled_fork` state; dropping the cron keeps it
# enabled. Public-repo Actions minutes on standard runners are free/unlimited.
on:
  push:
    branches:
     - main
     - release/*
    paths:
     - 'deps/**'
     - 'src/**'
     - '**/CMakeLists.txt'
     - 'version.inc'
     - 'localization/**'
     - 'resources/**'
     - ".github/workflows/build_*.yml"
     - 'tests/**'
     - 'build_linux.sh'

  pull_request:
    branches:
     - main
     - release/*
    paths:
     - 'deps/**'
     - 'deps_src/**'
     - 'src/**'
     - '**/CMakeLists.txt'
     - 'version.inc'
     - ".github/workflows/build_*.yml"
     - 'build_linux.sh'
     - 'tests/**'

  workflow_dispatch: # allows for manual dispatch
    inputs:
      build-deps-only:
        description: 'Only build dependencies (bypasses caching)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:
  build_linux:
    # amd64 only. The empty arch is load-bearing: it keeps the historical
    # 'linux-clang' deps cache key and the unsuffixed asset names.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: ""
            os: ${{ vars.SELF_HOSTED && 'orca-lnx-server' || 'ubuntu-24.04' }}
    if: ${{ !cancelled() }}
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      build-deps-only: ${{ inputs.build-deps-only || false }}
    secrets: inherit
  # Test job on the runner that built the Linux amd64 artifact.
  unit_tests_linux_x86_64:
    name: Linux x86_64
    needs: build_linux
    if: ${{ !cancelled() && success() }}
    uses: ./.github/workflows/unit_tests.yml
    with:
      os: ${{ vars.SELF_HOSTED && 'orca-lnx-server' || 'ubuntu-24.04' }}
      artifact: ${{ github.sha }}-tests-linux-x86_64
